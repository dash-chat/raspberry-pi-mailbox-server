# Hospital mission pack. Texts are sent VERBATIM (see firefighters.toml).

name = "Hospital"

greeting = """🏥 County hospital here. We're overwhelmed after the earthquake and the phone lines are dead. Will you help us get our messages through? Every minute counts!"""

[[missions]]
to = "firefighters"
text = """🏥 A patient just told us his sister is trapped in the basement of 12 Upper Street. Get this warning to the firefighters right away!"""
success = """🚒 We're heading to 12 Upper Street with the rescue team right now. Great work getting us the warning!"""

[[missions]]
to = "journalist"
text = """🏥 We urgently need blood donors, especially type O negative. Please have the journalist publish a call to the town!"""
success = """📰 Call published: O NEGATIVE DONORS NEEDED AT THE HOSPITAL. It's spreading everywhere already!"""

[[missions]]
to = "relative"
text = """🏥 We've admitted John with a broken leg, but he's out of danger and in good spirits. His family is out of town and doesn't know. Get them the news!"""
success = """💌 Thank you from the bottom of my heart! We were so worried. Tell John we'll bring him the chocolates he likes!"""

[[missions]]
to = "firefighters"
text = """🏥 The hospital's emergency generator is failing and we have patients on life support. The firefighters have a portable generator — take them this urgent request!"""
success = """🚒 Loading the portable generator onto the truck and bringing it over right now. Hold on!"""

[[missions]]
to = "journalist"
text = """🏥 We're using the north entrance because the main one has a cracked canopy. Everyone should know before coming — take this notice to the journalist!"""
success = """📰 Published: HOSPITAL ADMITTING THROUGH THE NORTH ENTRANCE. Pinning it to the top so nobody gets lost."""
