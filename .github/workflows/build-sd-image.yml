name: Build SD image

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    # The sdImage is an aarch64 build; run natively on an arm64 runner.
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31

      - uses: cachix/cachix-action@v16
        with:
          name: darksoil-studio
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build sdImage
        run: nix build .#sdImage --print-build-logs
